<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نموذج تقييم الدورة</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e2e;
      color: white;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #282a36;
      padding: 30px;
      border-radius: 10px;
      width: 100%;
      max-width: 750px;
      font-size: 20px;
    }
    h2 {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 15px;
      font-size: 22px;
    }
    select, input[type="text"], input[type="date"], textarea {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 5px;
      border: none;
      font-size: 20px;
      font-weight: bold;
      color: #000;
    }
    textarea {
      resize: vertical;
      height: 100px;
    }
    .btn {
      background: #ff5555;
      color: white;
      border: none;
      padding: 15px 25px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 25px;
      font-size: 22px;
      font-weight: bold;
      width: 100%;
    }
    .btn:hover {
      background: #ff79c6;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 34px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 5px;
    }
    .header h2 {
      font-size: 26px;
      font-weight: bold;
      color: #ffffff;
    }
    .dtc {
      color: #ff79c6;
    }
    @media (max-width: 600px) {
      .logo-container img {
        width: 50px !important;
        height: 50px !important;
      }
      .design-text {
        font-size: 10px !important;
        left: 20px !important;
        top: 60px !important;
      }
      .emoji-icon {
        font-size: 50px !important;
        top: 40px !important;
        right: 30px !important;
      }
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // تفعيل وضع ملء الشاشة مرة واحدة
      document.body.addEventListener("click", function () {
        const elem = document.documentElement;
        if (!document.fullscreenElement) {
          if (elem.requestFullscreen) {
            elem.requestFullscreen();
          } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
          } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
          }
        }
      }, { once: true });

      // تحميل أسماء الدورات
      fetch("https://script.google.com/macros/s/AKfycbzsP13vaBjKq_0Ww4NLXx0RkFbX2tToxrSes8MJP6KJU3dRQvqLNSe-mtbYL20pZXEgtQ/exec")
        .then(response => response.json())
        .then(data => {
          const datalist = document.getElementById("courseList");
          data.forEach(course => {
            const option = document.createElement("option");
            option.value = course;
            datalist.appendChild(option);
          });
        })
        .catch(error => console.error("❌ خطأ في تحميل أسماء الدورات:", error));
    });

    async function sendFormAndGenerate(event) {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);

      // 🔄 إظهار رسالة مؤقتة
      alert("📤 جاري إرسال البيانات وإنشاء الشهادة...");

      // إرسال البيانات
      await fetch("https://script.google.com/macros/s/AKfycbzsP13vaBjKq_0Ww4NLXx0RkFbX2tToxrSes8MJP6KJU3dRQvqLNSe-mtbYL20pZXEgtQ/exec", {
        method: "POST",
        body: formData
      });

      // انتظار توليد الشهادة تلقائياً
      setTimeout(() => {
        fetch("https://script.google.com/macros/s/AKfycbzsP13vaBjKq_0Ww4NLXx0RkFbX2tToxrSes8MJP6KJU3dRQvqLNSe-mtbYL20pZXEgtQ/exec?action=generateCertificate")
          .then(res => res.text())
          .then(msg => alert("✅ " + msg))
          .catch(err => alert("❌ حدث خطأ أثناء توليد الشهادة!"));
      }, 3000);
    }
  </script>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>مركز تدريب الصرف بطنطا</h1>
      <h2>Drainage Training Center - Tanta <span class="dtc">(DTC)</span></h2>
    </div>

    <h2>📝 نموذج تقييم الدورة التدريبية</h2>

    <form id="evaluationForm" onsubmit="sendFormAndGenerate(event)">
      <label>👤 اسم المتدرب:</label>
      <input type="text" name="traineeName" required>

      <label>📱 رقم الهاتف:</label>
      <input type="text" name="traineePhone" required>

      <label>🏢 الإدارة:</label>
      <input type="text" name="department" required>

      <label>🎓 المؤهل:</label>
      <input type="text" name="qualification" required>

      <label>💼 الوظيفة:</label>
      <input type="text" name="jobTitle" required>

      <label>🏨 حالة الإقامة:</label>
      <select name="residencyStatus" required>
        <option value="">اختر الحالة</option>
        <option>مقيم</option>
        <option>غير</option>
      </select>

      <label>📘 اسم الدورة:</label>
      <input type="text" name="courseName" list="courseList" required>
      <datalist id="courseList"></datalist>

      <label>📅 تاريخ بداية الدورة:</label>
      <input type="date" name="courseStartDate" required>

      <label>🧑‍🏫 تقييم المدرب:</label>
      <select name="trainerRating" required>
        <option>ممتاز</option>
        <option>جيد جداً</option>
        <option>جيد</option>
        <option>مقبول</option>
        <option>ضعيف</option>
      </select>

      <label>📚 تقييم المادة العلمية:</label>
      <select name="contentRating" required>
        <option>ممتاز</option>
        <option>جيد جداً</option>
        <option>جيد</option>
        <option>مقبول</option>
        <option>ضعيف</option>
      </select>

      <label>🏢 تقييم التنظيم وقاعة المحاضرات:</label>
      <select name="organizationRating" required>
        <option>ممتاز</option>
        <option>جيد جداً</option>
        <option>جيد</option>
        <option>مقبول</option>
        <option>ضعيف</option>
      </select>

      <label>🏨 تقييم الإقامة:</label>
      <select name="residencyRating" required>
        <option>ممتاز</option>
        <option>جيد جداً</option>
        <option>جيد</option>
        <option>مقبول</option>
        <option>ضعيف</option>
      </select>

      <label>📝 ملاحظات إضافية:</label>
      <textarea name="comments" placeholder="اكتب ملاحظاتك إن وجدت..."></textarea>

      <button class="btn" type="submit">📤 إرسال التقييم</button>
    </form>
  </div>
</body>
</html>
